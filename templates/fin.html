<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Le Pendu - Fin de partie</title>
</head>
<body>
    <h1>Fin de partie, {{ nom }} !</h1>

    {% if gagne %}
        <h2> Bravo, tu as gagné !</h2>
    {% else %}
        <h2> Dommage, tu as perdu...</h2>
    {% endif %}

    <p><strong>Le mot à deviner était :</strong> {{ mot }}</p>

    <form action="/" method="get">
        <button type="submit">Rejouer une nouvelle partie</button>
    </form>
</body>
</html>
